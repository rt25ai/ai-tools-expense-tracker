name: Rebuild Manual Imports

on:
  push:
    branches:
      - master
    paths:
      - manual_receipts.json
      - auto_invoice_status.json
      - dashboard-web/public/data.json
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: rebuild-manual-imports
  cancel-in-progress: true

jobs:
  rebuild:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip openpyxl requests pdfplumber

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: dashboard-web/package-lock.json

      - name: Install dashboard dependencies
        working-directory: dashboard-web
        run: npm ci

      - name: Build Excel report
        run: python build_report.py

      - name: Build dashboard export
        working-directory: dashboard-web
        run: npm run build

      - name: Commit rebuilt artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add AI_Tools_Expenses_2025_2026.xlsx docs
          if git diff --cached --quiet; then
            echo "No rebuilt artifacts changed."
            exit 0
          fi
          git commit -m "Rebuild dashboard and Excel from manual imports"

          # Retry with pull --rebase to handle concurrent pushes from
          # auto_invoice.py / gmail-scanner.yml / local pushes.
          push_with_retry() {
            local target_ref="$1"
            local attempts=0
            local max_attempts=5
            while [ $attempts -lt $max_attempts ]; do
              if git push origin HEAD:"$target_ref"; then
                return 0
              fi
              attempts=$((attempts + 1))
              echo "Push to $target_ref failed (attempt $attempts/$max_attempts), pulling and retrying..."
              git fetch origin "$target_ref"
              git pull --rebase --autostash origin "$target_ref" || git rebase --abort || true
            done
            echo "Failed to push to $target_ref after $max_attempts attempts"
            return 1
          }

          push_with_retry "${GITHUB_REF_NAME}"
          if [ "${GITHUB_REF_NAME}" = "master" ]; then
            push_with_retry "main"
          elif [ "${GITHUB_REF_NAME}" = "main" ]; then
            push_with_retry "master"
          fi
