name: Gmail Invoice Scanner

on:
  schedule:
    - cron: '0 3 * * *'  # 03:00 UTC = 05:00 Israel (winter) / 06:00 (summer) — before local 08:00 run
  workflow_dispatch:      # Allow manual trigger from GitHub UI

permissions:
  contents: write

concurrency:
  group: gmail-scanner
  cancel-in-progress: false  # Never cancel mid-scan

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Write Gmail credentials from secrets
        env:
          GMAIL_CREDENTIALS: ${{ secrets.GMAIL_CREDENTIALS }}
          GMAIL_TOKEN: ${{ secrets.GMAIL_TOKEN }}
        run: |
          printf '%s' "$GMAIL_CREDENTIALS" > gmail_credentials.json
          printf '%s' "$GMAIL_TOKEN" > gmail_token.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install google-auth google-auth-oauthlib google-api-python-client pdfplumber requests openpyxl

      - name: Run Gmail scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python auto_invoice.py

      # Pull the commits that auto_invoice.py pushed (status + data.json),
      # then rebuild the static dashboard HTML so GitHub Pages always shows
      # the real last-scan timestamp — not a stale build from days ago.
      - name: Pull scanner commits
        run: git pull --rebase --autostash origin master

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: dashboard-web/package-lock.json

      - name: Install dashboard dependencies
        working-directory: dashboard-web
        run: npm ci

      - name: Rebuild dashboard HTML
        working-directory: dashboard-web
        run: npm run build

      - name: Commit and push rebuilt dashboard
        run: |
          git add AI_Tools_Expenses_2025_2026.xlsx docs
          if git diff --cached --quiet; then
            echo "Dashboard HTML already up to date."
            exit 0
          fi
          git commit -m "Auto: rebuild dashboard after Gmail scan"
          git push origin HEAD:master
          git push origin HEAD:main
